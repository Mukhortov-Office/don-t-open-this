<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Launchers</title>
	<style>
		:root{
			--bg:#0f1724;
			--card:#0b1220;
			--accent1:#7c3aed;
			--accent2:#06b6d4;
			--glass: rgba(255,255,255,0.04);
		}
		html,body{height:100%;}
		body{
			margin:0;
			font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
			background: radial-gradient(1000px 600px at 20% 10%, rgba(124,58,237,0.12), transparent),
									radial-gradient(800px 400px at 80% 90%, rgba(6,182,212,0.08), transparent),
									var(--bg);
			color:#e6eef8;
			display:flex;
			align-items:center;
			justify-content:center;
			overflow:hidden;
		}
		.container{
			text-align:center;
			padding:48px;
			border-radius:16px;
			background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
			box-shadow: 0 8px 30px rgba(2,6,23,0.6);
			backdrop-filter: blur(6px);
		}
		h1{margin:0 0 18px 0;font-size:20px;font-weight:600;color:#cfe7ff}

		.buttons{display:flex;gap:20px;align-items:center;justify-content:center}
		a.btn{
			display:inline-flex;align-items:center;gap:12px;padding:14px 22px;border-radius:12px;
			color:white;text-decoration:none;font-weight:600;background:linear-gradient(135deg,var(--accent1),var(--accent2));
			box-shadow:0 6px 18px rgba(12,18,30,0.6);transform:translateZ(0);
			transition:transform .22s ease, box-shadow .22s ease, filter .22s ease;
		}
		a.btn:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 18px 40px rgba(12,18,30,0.6);filter:brightness(1.05)}
		a.btn:active{transform:translateY(-2px) scale(0.995)}
		.icon{
			width:36px;height:36px;border-radius:8px;display:inline-grid;place-items:center;background:rgba(255,255,255,0.08);
			font-weight:700;font-size:14px;color:transparent;backdrop-filter:blur(2px);
		}

		/* Animated pulse behind buttons */
		.pulse{
			position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;
		}
		.pulse span{position:absolute;display:block;border-radius:50%;width:260px;height:260px;background:radial-gradient(circle at 30% 30%, rgba(124,58,237,0.12), transparent 40%), radial-gradient(circle at 70% 70%, rgba(6,182,212,0.08), transparent 40%);filter:blur(28px);opacity:0.9; animation:float 8s ease-in-out infinite}
		@keyframes float{0%{transform:scale(.95) translateY(-6px)}50%{transform:scale(1.05) translateY(6px)}100%{transform:scale(.95) translateY(-6px)}}

		/* Top-right small text */
		.corner{
			position:fixed;top:18px;right:18px;color:#c7d8ff88;font-size:13px;padding:8px 12px;border-radius:8px;background:var(--glass);backdrop-filter:blur(6px);
			box-shadow:0 6px 18px rgba(2,6,23,0.5);
		}

		/* Responsive */
		@media (max-width:520px){
			.buttons{flex-direction:column}
			a.btn{width:220px;justify-content:center}
		}
	</style>
</head>
<body>
	<div class="corner">Mukhortov Prodaction pls teacher put 12 for this site W or L ?</div>

	<div class="pulse" aria-hidden="true"><span></span></div>

	<main class="container" role="main">
		<h1>select the Minecraft Launcher you'll use.</h1>

		<div class="buttons">
			<a class="btn" href="https://skmedix.pl" target="_blank" rel="noopener noreferrer">
				<div class="icon" aria-hidden="true">SK</div>
				<div>
					<div style="font-size:14px">sklauncher Minecraft</div>
					<div style="font-size:12px;color:#cfe7ff88;margin-top:4px">Opens skmedix.pl</div>
				</div>
			</a>

			<a class="btn" href="https://tlauncher.org/en/?pk_vid=86f53605dbd7bc0a17726445972793a8" target="_blank" rel="noopener noreferrer">
				<div class="icon" aria-hidden="true">TL</div>
				<div>
					<div style="font-size:14px">TLauncher</div>
					<div style="font-size:12px;color:#cfe7ff88;margin-top:4px">Opens tlauncher.org</div>
				</div>
			</a>
		</div>
	</main>
</body>
</html>
