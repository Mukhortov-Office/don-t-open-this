<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mukhortov Production - CS 1.6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(ellipse at 20% 50%, rgba(138, 43, 226, 0.3) 0%, transparent 50%), 
                        radial-gradient(ellipse at 80% 80%, rgba(30, 144, 255, 0.3) 0%, transparent 50%),
                        linear-gradient(135deg, #0a0e27 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #11152d 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 60px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 10px, #eee, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .warning {
            background-color: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .button {
            background-color: #6a0dad;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s ease-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin: 20px;
            position: relative;
            z-index: 10;
        }

        .button:hover {
            background-color: #8b3dd3;
            box-shadow: 0 12px 35px rgba(106, 10, 173, 0.6),
                        0 0 20px rgba(106, 10, 173, 0.4);
            filter: brightness(1.2);
        }

        .button:active {
            transform: scale(0.95);
        }

        .footer-text {
            margin-top: 30px;
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">Mukhortov production</div>

    <div class="warning">
        ⚠️ WARNING: This website is for educational purposes only and is not responsible if anything is ugly or offensive. ⚠️
    </div>

    <div class="container">
        <button class="button" onclick="window.location.href='https://gam1ngcs.com/downloadcs16'">download cs 1.6</button>
        <div class="footer-text">Please, 12</div>
    </div>

    <script>
        const button = document.querySelector('.button');

        button.addEventListener('mouseenter', () => {
            button.style.transform = 'translateY(-20px)';
        });

        button.addEventListener('mouseleave', () => {
            button.style.transform = 'translateY(0)';
        });
    </script>
</body>
</html>
</html>
